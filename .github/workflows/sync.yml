name: Restock ETA Sync

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write # needed so the job can commit the updated state.json back

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run restock ETA sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: python restock_eta_sync.py

      - name: Commit updated state file
        run: |
          git config user.name "restock-eta-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update restock ETA state"
          git push
